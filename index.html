const B=[['全国通','🇨🇳 🌐 ✅','打一项 FEELINGME 权益，到不同城市也能继续练'],['随时约','⏰ 📅 ✅','打一项 FEELINGME 权益，时间安排更灵活'],['自由选','🆓 👆 ✅','打一项 FEELINGME 权益，适配你的训练风格']].map(x=>({...q(x),cat:'品牌权益'}));
function q(x){return{answer:x[0],emoji:x[1],hint:x[2]}}function $(id){return document.getElementById(id)}function chars(s){return Array.from(s)}function norm(s){return s.replace(/\s/g,'').replace(/[，。,.!！?？]/g,'')}function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
let qs=[],i=0,score=0,locked=false,records=[],tip=false,comp=false,timer=null;const screens=['intro','game','result'].map($);$('quizMascot').src=$('heroImg').src;
function show(id){screens.forEach(s=>s.classList.toggle('active',s.id===id))}function pick(){return shuffle([...shuffle(E).slice(0,2),...shuffle(A).slice(0,2),...shuffle(B).slice(0,1)])}
function start(){clearTimeout(timer);qs=pick();i=0;score=0;records=[];show('game');render()}function render(){const it=qs[i];locked=false;tip=false;$('idx').textContent=i+1;$('fill').style.width=(i+1)*20+'%';$('cat').textContent=it.cat;$('emoji').textContent=it.emoji;$('hint').textContent=it.hint;$('answer').value='';$('answer').maxLength=24;$('feedback').textContent='';$('feedback').className='feedback';$('submit').disabled=false;$('letter').disabled=false;$('letter').textContent='首字提示';boxes();setTimeout(()=>$('answer').focus(),80)}
function boxes(){const it=qs[i],len=chars(it.answer).length,got=chars(norm($('answer').value)).slice(0,len),ans=chars(it.answer);$('boxes').style.gridTemplateColumns=`repeat(${len},minmax(0,1fr))`;$('boxes').innerHTML=ans.map((c,n)=>`<span class="box ${got[n]||tip&&n===0?'':'empty'}">${got[n]||(tip&&n===0?c:'')}</span>`).join('')}
function submit(){if(locked)return;sync();const it=qs[i],ua=norm($('answer').value),ok=ua===it.answer;locked=true;$('submit').disabled=true;$('letter').disabled=true;if(ok)score++;$('feedback').textContent=ok?(i===4?'答对了！马上查看你的运动表现。':'答对了！马上进入下一题。'):(i===4?`差一点，正确答案是「${it.answer}」。马上查看结果。`:`差一点，正确答案是「${it.answer}」。马上进入下一题。`);$('feedback').classList.add(ok?'right':'wrong');records.push({it,ua:ua||'未填写',ok});timer=setTimeout(next,1100)}function next(){i<4?(i++,render()):result()}function result(){const levels=[['暑期热身观察员','你已经进入运动状态，下一次可以从一个熟悉动作开始慢慢找回节奏。'],['燃脂入门生','你抓住了第一段节奏，身体已经听见开练信号。小礼物也为你准备好了。'],['核心唤醒者','你对训练场景很有感觉，器械、动作和权益都开始进入你的运动地图。'],['节奏掌控者','你已经能稳定识别训练线索，下一节私教课可以把目标再推高一点。'],['私教进阶玩家','你的健身雷达很敏锐，训练动作和工作室权益都难不倒你。'],['暑期运动满贯王','五题全中！今天的运动脑力和行动力都在线。该去领取你的高光奖励了。']];let lv=levels[score];$('score').textContent=score;$('medal').textContent=score;$('level').textContent=lv[0];$('copy').textContent=lv[1];$('review').innerHTML=records.map((r,n)=>`<div class="row"><span>${r.ok?'✓':'!'} ${n+1}. ${r.it.answer}</span><small>${r.it.cat}</small></div>`).join('');$('gift').href=GIFT;$('gift').classList.toggle('show',score>=1);show('result')}
function sync(){const len=chars(qs[i].answer).length;$('answer').value=chars(norm($('answer').value)).slice(0,len).join('');boxes()}$('start').onclick=start;$('again').onclick=start;$('submit').onclick=submit;$('letter').onclick=()=>{if(locked)return;tip=true;$('letter').disabled=true;$('letter').textContent='已提示：'+chars(qs[i].answer)[0];boxes();$('answer').focus()};$('boxes').onclick=()=>$('answer').focus();$('answer').addEventListener('compositionstart',()=>comp=true);$('answer').addEventListener('compositionend',()=>{comp=false;sync()});$('answer').addEventListener('input',()=>{if(!comp)sync()});$('answer').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();submit()}});
</script>
