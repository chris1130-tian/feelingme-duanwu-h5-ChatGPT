<body>
<main class="app">
<section class="screen on" id="intro"><div class="bar"><span class="brand">FEELINGME</span><span class="tag">端午开练</span></div><div class="hero"><span class="badge">5题挑战</span><div class="me" aria-hidden="true"><i class="face"><i class="smile"></i></i><i class="body">ME</i><i class="arm l"></i><i class="arm r"></i><i class="leg l"></i><i class="leg r"></i><i class="shoe l"></i><i class="shoe r"></i></div><span class="zongzi">粽子能量</span><span class="boat">🐲🚣</span></div><h1>端午开练</h1><p class="sub">emoji猜题，测一测你是哪种运动力。答对即可领小礼物。</p><button class="btn primary" id="start">开始挑战</button></section>

<script>

const bank=[['哑铃','运动器械','打一健身房里的手持器械','🤐 🔔'],['杠铃','运动器械','打一件两端加片的力量器械','➖ 🔔'],['跑步机','运动器械','打一件常见有氧器械','🏃 👣 ⚙️'],['划船机','运动器械','打一件像在水上训练的器械','🚣 🛶 ⚙️'],['龙门架','运动器械','打一件可以做绳索训练的大型器械','🐉 🚪 🏗️'],['壶铃','运动器械','打一件像茶壶一样的力量器械','🫖 🔔'],['弹力带','运动器械','打一件可拉伸的训练小工具','↔️ 💪 🎗️'],['瑜伽垫','运动器械','打一件铺在地上的训练用品','🧘 🟨'],['椭圆机','运动器械','打一件低冲击有氧器械','🥚 ⭕ ⚙️'],['动感单车','运动器械','打一件骑行类有氧器械','🎵 🚴'],['腹肌轮','运动器械','打一件训练核心的小轮子','🍫 🔘'],['泡沫轴','运动器械','打一件放松肌肉的圆柱工具','🫧 🧻'],['药球','运动器械','打一件可以抛接训练的重球','💊 ⚽'],['战绳','运动器械','打一件甩起来很燃的粗绳','⚔️ 🪢'],['跳绳','运动器械','打一件轻便有氧小工具','🦘 🪢'],['史密斯机','运动器械','打一件固定轨道杠铃器械','🛤️ 🏋️ ⚙️'],['卧推凳','运动器械','打一件躺着推胸会用到的凳子','🛏️ 💪 🪑'],['深蹲架','运动器械','打一件练深蹲常用的大架子','⬇️ 🦵 🏗️'],['引体架','运动器械','打一件向上拉身体会用到的架子','⬆️ 🧍 🏗️'],['腿举机','运动器械','打一件用腿往上推的器械','🦵 ⬆️ ⚙️'],['拉力器','运动器械','打一件用拉力做训练的器械','🤏 ➡️ 💪'],['踏板','运动器械','打一件上下台阶训练用品','👟 ⬆️ 🟦'],['健身球','运动器械','打一件大圆球训练用品','🏋️ ⚽'],['臀推机','运动器械','打一件练臀发力的器械','🍑 ⬆️ ⚙️'],['滑盘','运动器械','打一件脚下滑动训练用品','🛝 🥏'],['深蹲','运动动作','打一项练腿练臀的基础动作','⬇️ 🦵 🍑'],['平板支撑','运动动作','打一项考验核心稳定的动作','🟫 📏 🤲'],['波比跳','运动动作','打一项全身燃脂动作','🌊 🆚 🦘'],['弓步蹲','运动动作','打一项单腿发力感很强的动作','🏹 🦵 ⬇️'],['俯卧撑','运动动作','打一项经典自重上肢动作','⬇️ 🤲 ⬆️'],['臀桥','运动动作','打一项唤醒臀部发力的动作','🍑 🌉'],['卷腹','运动动作','打一项腹部收卷动作','🌀 🍫'],['引体向上','运动动作','打一项把身体拉上去的动作','🧍 ⬆️ 🤲'],['硬拉','运动动作','打一项从地面拉起重量的动作','🪨 ⬆️ 💪'],['卧推','运动动作','打一项躺着向上推的动作','🛏️ ⬆️ 💪'],['开合跳','运动动作','打一项双脚开合的热身动作','↔️ 🦵 🦘'],['高抬腿','运动动作','打一项原地快速抬腿动作','⬆️ 🦵 🏃'],['登山跑','运动动作','打一项像爬山一样的燃脂动作','⛰️ 🏃'],['俄罗斯转体','运动动作','打一项坐姿左右转动核心动作','🇷🇺 🔄 🧘'],['侧平板','运动动作','打一项侧身支撑动作','↔️ 🟫 🤲'],['臀推','运动动作','打一项向上顶髋练臀动作','🍑 ⬆️'],['划船','运动动作','打一项往后拉的背部动作','🚣 💪'],['肩推','运动动作','打一项向上推举练肩动作','🤷 ⬆️ 💪'],['弯举','运动动作','打一项手臂弯曲发力动作','💪 ↩️'],['下压','运动动作','打一项手臂向下发力动作','👇 💪'],['提踵','运动动作','打一项脚跟抬起的小腿动作','🦶 ⬆️'],['跳箱','运动动作','打一项跳上箱子的爆发动作','🦘 📦'],['农夫走','运动动作','打一项双手负重行走动作','👨‍🌾 🧳 🚶'],['甩战绳','运动动作','打一项用粗绳快速摆动的动作','⚔️ 🪢 〰️'],['拉伸','运动动作','打一项训练后放松动作','↔️ 🧘'],['全国通','品牌权益','打一项 FEELINGME 权益，到不同城市也能继续练','🧑‍🏫 🇨🇳 🔁'],['随时约','品牌权益','打一项 FEELINGME 权益，时间安排更灵活','📚 ⏰ 📲'],['自由选','品牌权益','打一项 FEELINGME 权益，适配你的训练风格','🧑‍🏫 🆓 👆']].map(([answer,category,hint,emoji])=>({answer,category,hint,emoji}));
const levels=[['端午热身观察员','你已经进入运动状态，下一次可以从一个熟悉动作开始慢慢找回节奏。'],['燃脂入门生','你抓住了第一段节奏，身体已经听见开练信号。小礼物也为你准备好了。'],['核心觉醒者','你对训练场景很有感觉，器械、动作和权益都开始进入你的运动地图。'],['节奏掌控者','你已经能稳稳识别训练线索，下一节私教课可以把目标再推高一点。'],['私教进阶玩家','你的健身雷达很敏锐，训练动作和工作室权益都难不倒你。'],['端午运动满贯王','五题全中，今天的运动脑力和行动力都在线。该去领取你的高光奖励了。']];
const $=s=>document.querySelector(s);let qs=[],cur=0,score=0,locked=false,records=[],timer=0,composing=false;function shuffle(a){return [...a].sort(()=>Math.random()-.5)}function norm(v){return v.replace(/\s/g,'').replace(/[，。,.!！?？]/g,'')}function chars(v){return Array.from(v)}function screen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$(id).classList.add('on')}function pick(){return shuffle([...shuffle(bank.filter(x=>x.category==='运动器械')).slice(0,2),...shuffle(bank.filter(x=>x.category==='运动动作')).slice(0,2),...shuffle(bank.filter(x=>x.category==='品牌权益')).slice(0,1)]).slice(0,GAME_SIZE)}function start(){clearTimeout(timer);qs=pick();cur=0;score=0;records=[];$('#total').textContent=GAME_SIZE;screen('#game');render()}function render(){locked=false;clearTimeout(timer);const q=qs[cur],n=chars(q.answer).length;$('#idx').textContent=cur+1;$('#fill').style.width=((cur+1)/GAME_SIZE*100)+'%';$('#cat').textContent=q.category;$('#emoji').textContent=q.emoji;$('#hint').textContent=q.hint;$('#answer').value='';$('#answer').placeholder=`请输入${n}个字`;$('#tip').textContent='';$('#tip').className='tip';$('#submit').disabled=false;boxes();setTimeout(()=>$('#answer').focus(),80)}function boxes(){const q=qs[cur],n=chars(q.answer).length,input=chars(norm($('#answer').value)).slice(0,n);$('#boxes').style.gridTemplateColumns=`repeat(${n},1fr)`;$('#boxes').innerHTML=Array.from({length:n},(_,i)=>`<span class="box">${input[i]||'&nbsp;'}</span>`).join('')}function submit(){if(locked)return;const q=qs[cur],ans=norm($('#answer').value),ok=ans===q.answer;locked=true;$('#submit').disabled=true;if(ok)score++;$('#tip').textContent=ok?(cur===GAME_SIZE-1?'答对了！马上查看你的运动表现。':'答对了！马上进入下一题。'):(cur===GAME_SIZE-1?`差一点，正确答案是「${q.answer}」。马上查看结果。`:`差一点，正确答案是「${q.answer}」。马上进入下一题。`);$('#tip').classList.add(ok?'right':'wrong');records.push({q,ans:ans||'未填写',ok});timer=setTimeout(next,1100)}function next(){if(cur<GAME_SIZE-1){cur++;render()}else result()}function result(){const [
